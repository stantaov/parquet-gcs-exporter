apiVersion: bindplane.observiq.com/v1
kind: DestinationType
metadata:
  name: parquet-gcs-storage
  displayName: Parquet GCS Storage
  icon: data:image/png;base64,
  description: >
    Exports logs as Parquet files to Google Cloud Storage.
    Each field in the log body becomes a Parquet column, partitioned by time.
    Files are written on a configurable batch size or timeout, whichever comes first.
spec:
  version: 0.2.0
  parameters:
    - name: telemetry_types
      label: Telemetry Types
      description: Parquet GCS Storage supports Logs only.
      type: telemetrySelector
      validValues:
        - Logs
      default:
        - Logs

    # ── GCS ──────────────────────────────────────────────────────────────
    - name: bucket_name
      label: Bucket Name
      description: Name of the destination GCS bucket. Must be globally unique.
      type: string
      required: true

    - name: folder_name
      label: Folder Name
      description: >
        An optional folder path prepended to every object, e.g. "wsa/raw".
        Do not include a trailing slash.
      type: string
      default: logs

    - name: project_id
      label: GCP Project ID
      description: >
        GCP project that owns the bucket.
        Leave empty to read from the credential file or Application Default Credentials.
      type: string
      default: ""

    # ── Authentication ────────────────────────────────────────────────────
    - name: credentials_file
      label: Credentials File
      description: >
        Path to a Google credential file on the collector host.
        Accepts a Service Account JSON key or a Workload Identity Federation (WIF)
        external-credentials config file (e.g. /etc/security/wif/my-config.json).
        Leave empty to use Application Default Credentials (ADC) — correct for GKE
        with Workload Identity enabled.
      type: string
      default: ""

    # ── Partitioning ──────────────────────────────────────────────────────
    - name: granularity
      label: Partition Granularity
      description: >
        Controls the GCS folder structure used for time partitioning.
        BigQuery uses these Hive-style paths for partition pruning on external tables.
        Hour is recommended for security logs — fresh data with reasonable file sizes.
      type: enum
      validValues:
        - day
        - hour
        - minute
      default: hour

    # ── Batching ──────────────────────────────────────────────────────────
    - name: batch_size
      label: Records per File
      description: >
        Flush and write a new Parquet file after this many log records.
        Larger values produce bigger files with fewer GCS objects.
      type: int
      default: 50000
      advancedConfig: true

    - name: batch_timeout
      label: Flush Timeout
      description: >
        Flush after this many seconds even if batch_size has not been reached.
        Ensures files are written during low-volume periods.
      type: int
      default: 300
      advancedConfig: true

    # ── Retry on Failure ──────────────────────────────────────────────────
    - name: retry_on_failure_enabled
      label: Enable Retry on Failure
      description: Retry failed exports with exponential back-off.
      type: bool
      default: true
      advancedConfig: true
      options:
        sectionHeader: true

    - name: retry_on_failure_initial_interval
      label: Initial Interval
      description: Time (in seconds) to wait after the first failure before retrying.
      type: int
      default: 5
      relevantIf:
        - name: retry_on_failure_enabled
          operator: equals
          value: true
      advancedConfig: true

    - name: retry_on_failure_max_interval
      label: Max Interval
      description: Upper bound (in seconds) on retry back-off interval.
      type: int
      default: 30
      relevantIf:
        - name: retry_on_failure_enabled
          operator: equals
          value: true
      advancedConfig: true

    - name: retry_on_failure_max_elapsed_time
      label: Max Elapsed Time
      description: >
        Give up retrying after this total duration (in seconds).
        Set to 0 to retry indefinitely (recommended for no data loss).
      type: int
      default: 0
      relevantIf:
        - name: retry_on_failure_enabled
          operator: equals
          value: true
      advancedConfig: true

    # ── Sending Queue ─────────────────────────────────────────────────────
    - name: sending_queue_enabled
      label: Enable Sending Queue
      description: >
        Buffer exports in an in-memory queue to decouple ingestion from GCS writes.
      type: bool
      default: true
      advancedConfig: true
      options:
        sectionHeader: true

    - name: sending_queue_num_consumers
      label: Number of Consumers
      description: Number of workers that dequeue and send batches concurrently.
      type: int
      default: 10
      advancedConfig: true

    - name: sending_queue_queue_size
      label: Queue Size
      description: Maximum number of batches held in memory before dropping.
      type: int
      default: 1000
      advancedConfig: true

    - name: persistent_queue_storage
      label: Persistent Queue Storage
      description: >
        Name of a filestorage extension to use for persistent queue.
        When set, the queue survives collector restarts — no data loss on crash.
        Example: file_storage/parquet_queue
        Leave empty to use the default in-memory queue.
      type: string
      default: ""
      relevantIf:
        - name: sending_queue_enabled
          operator: equals
          value: true
      advancedConfig: true

  logs:
    processors: |
      - batch/parquet_gcs:
          send_batch_size: {{ .batch_size }}
          timeout: {{ bpRenderDurationInSeconds .batch_timeout }}
    exporters: |
      {{ if has "Logs" .telemetry_types }}
      - parquetgcsstorage:
          bucket: "{{ .bucket_name }}"
          prefix: "{{ .folder_name }}"
          {{ if .project_id }}project_id: "{{ .project_id }}"{{ end }}
          {{ if .credentials_file }}credentials_file: "{{ .credentials_file }}"{{ end }}
          partition_format: "{{ if eq .granularity "minute" }}year=2006/month=01/day=02/hour=15/minute=04{{ else if eq .granularity "hour" }}year=2006/month=01/day=02/hour=15{{ else }}year=2006/month=01/day=02{{ end }}"
          {{ bpRenderOtelRetryOnFailureConfig .retry_on_failure_enabled .retry_on_failure_initial_interval .retry_on_failure_max_interval .retry_on_failure_max_elapsed_time }}
          {{ if .sending_queue_enabled }}
          sending_queue:
            num_consumers: {{ .sending_queue_num_consumers }}
            queue_size: {{ .sending_queue_queue_size }}
            {{ if .persistent_queue_storage }}storage: "{{ .persistent_queue_storage }}"{{ end }}
          {{ end }}
      {{ end }}
