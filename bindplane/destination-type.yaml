apiVersion: bindplane.observiq.com/v1
kind: DestinationType
metadata:
  name: parquet-gcs-storage
  displayName: Parquet GCS Storage
  description: >
    Exports logs as Parquet files to Google Cloud Storage.
    Each field in the log body becomes a column. Files are
    partitioned by time and uploaded on a configurable batch
    size or timeout, whichever comes first.
spec:
  parameters:
    # ── GCS ──────────────────────────────────────────────────
    - name: bucket
      label: GCS Bucket Name
      description: Name of the destination GCS bucket.
      type: string
      required: true

    - name: project_id
      label: GCP Project ID
      description: >
        GCP project that owns the bucket.
        Leave empty to use Application Default Credentials project.
      type: string
      required: false
      default: ""

    - name: prefix
      label: Object Prefix
      description: >
        Path prefix prepended to every object, e.g. "wsa/raw".
        Do not include a trailing slash.
      type: string
      default: logs

    - name: granularity
      label: Partition Granularity
      description: >
        Controls the GCS folder structure used for time partitioning.
        BigQuery uses these Hive-style paths for partition pruning on external tables.
        "Hour" is recommended for security logs — fresh data with reasonable file sizes.
      type: enum
      validValues:
        - day
        - hour
        - minute
      default: hour

    # ── Authentication ────────────────────────────────────────
    - name: credentials_file
      label: Credentials File
      description: >
        Path to a Google credential file on the collector host.
        Accepts a Service Account JSON key or a Workload Identity Federation (WIF)
        external-credentials config file (e.g. /etc/security/wif/my-config.json).
        Leave empty to use Application Default Credentials (ADC), which is the
        correct setting when running on GKE with Workload Identity enabled.
      type: string
      required: false
      default: ""

    # ── Batching (controls file size / freshness) ─────────────
    - name: batch_size
      label: Records per File
      description: >
        Flush and write a new Parquet file after this many log records.
        Larger values = bigger files, fewer GCS objects.
      type: int
      default: 50000

    - name: batch_timeout
      label: Flush Timeout
      description: >
        Flush after this duration even if batch_size has not been reached.
        Ensures files are written during low-volume periods.
        Format: Go duration string, e.g. 5m, 30s.
      type: string
      default: 5m

    # ── Retry on failure ──────────────────────────────────────
    - name: retry_enabled
      label: Enable Retry on Failure
      description: Retry failed exports with exponential back-off.
      type: bool
      default: true

    - name: retry_initial_interval
      label: Initial Interval
      description: Time to wait after the first failure before retrying (e.g. 5s).
      type: string
      default: "5s"
      relevantIf:
        - name: retry_enabled
          operator: equals
          value: true

    - name: retry_max_interval
      label: Max Interval
      description: Upper bound on retry back-off interval (e.g. 30s).
      type: string
      default: "30s"
      relevantIf:
        - name: retry_enabled
          operator: equals
          value: true

    - name: retry_max_elapsed_time
      label: Max Elapsed Time
      description: Give up retrying after this total duration (e.g. 300s). 0 means never give up.
      type: string
      default: "300s"
      relevantIf:
        - name: retry_enabled
          operator: equals
          value: true

    # ── Sending queue ─────────────────────────────────────────
    - name: queue_enabled
      label: Enable Sending Queue
      description: Buffer exports in an in-memory queue to decouple ingestion from GCS writes.
      type: bool
      default: true

    - name: queue_num_consumers
      label: Number of Consumers
      description: Number of workers that dequeue and send batches concurrently.
      type: int
      default: 10

    - name: queue_size
      label: Queue Size
      description: Maximum number of batches held in memory before dropping.
      type: int
      default: 1000

  template: |
    processors:
      batch/parquet_gcs:
        send_batch_size: {{ .batch_size }}
        timeout: {{ .batch_timeout }}
    exporters:
      parquetgcsstorage:
        {{ if .project_id }}project_id: "{{ .project_id }}"{{ end }}
        {{ if .credentials_file }}credentials_file: "{{ .credentials_file }}"{{ end }}
        bucket: "{{ .bucket }}"
        prefix: "{{ .prefix }}"
        partition_format: "{{ if eq .granularity "minute" }}year=2006/month=01/day=02/hour=15/minute=04{{ else if eq .granularity "hour" }}year=2006/month=01/day=02/hour=15{{ else }}year=2006/month=01/day=02{{ end }}"
        retry_on_failure:
          enabled: {{ .retry_enabled }}
          initial_interval: {{ .retry_initial_interval }}
          max_interval: {{ .retry_max_interval }}
          max_elapsed_time: {{ .retry_max_elapsed_time }}
        sending_queue:
          enabled: {{ .queue_enabled }}
          num_consumers: {{ .queue_num_consumers }}
          queue_size: {{ .queue_size }}
    service:
      pipelines:
        logs:
          processors: [batch/parquet_gcs]
          exporters: [parquetgcsstorage]
